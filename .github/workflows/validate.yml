name: Validate GCB-KG

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml

      - name: Validate nodes/edges
        run: |
          python pipelines/validate.py

      - name: Export NDJSON
        run: |
          python pipelines/export_ndjson.py
