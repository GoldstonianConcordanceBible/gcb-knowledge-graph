openapi: 3.0.3
info:
  title: GCB Knowledge Graph API
  version: 0.1.0
  description: >
    Reference API contract for the Goldstonian Concordance Bible Knowledge Graph (GCB-KG).
    This file defines how clients query nodes, edges, and neighbors. Implementation may vary.

servers:
  - url: https://example.org/api

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK

  /node/{id}:
    get:
      summary: Fetch a node by stable ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Node found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Node" }
        "404":
          description: Not found

  /edge:
    get:
      summary: Search edges by from_id/to_id/relation
      parameters:
        - in: query
          name: from_id
          schema: { type: string }
        - in: query
          name: to_id
          schema: { type: string }
        - in: query
          name: relation
          schema: { type: string }
      responses:
        "200":
          description: Matching edges
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Edge" }

  /neighbors/{id}:
    get:
      summary: Get neighbors of a node (graph traversal)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: relation
          schema: { type: string }
        - in: query
          name: direction
          schema:
            type: string
            enum: [out, in, both]
            default: both
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Neighbor nodes + edges
          content:
            application/json:
              schema:
                type: object
                properties:
                  center_id: { type: string }
                  nodes:
                    type: array
                    items: { $ref: "#/components/schemas/Node" }
                  edges:
                    type: array
                    items: { $ref: "#/components/schemas/Edge" }

  /search:
    get:
      summary: Full-text search over titles/descriptions/tags
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    title: { type: string }
                    type: { type: string }
                    score: { type: number }

  /verse/{ref}:
    get:
      summary: Resolve a human verse ref to node ID(s)
      parameters:
        - in: path
          name: ref
          required: true
          schema:
            type: string
          example: "Genesis 1:1"
      responses:
        "200":
          description: Verse resolution
          content:
            application/json:
              schema:
                type: object
                properties:
                  input: { type: string }
                  resolved_ids:
                    type: array
                    items: { type: string }

components:
  schemas:
    Node:
      type: object
      required: [kind, id, type, title, description, sources, tags, gcb_layer, created_at, updated_at, license]
      properties:
        kind: { type: string, enum: [node] }
        id: { type: string }
        type: { type: string }
        title: { type: string }
        description: { type: string }
        sources:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        gcb_layer: { type: string, enum: [Mirror, Water, Fire] }
        tradition: { type: string }
        created_at: { type: string }
        updated_at: { type: string }
        license: { type: string }
        meta:
          type: object
          additionalProperties: true

    Edge:
      type: object
      required: [kind, from_id, to_id, relation, weight, evidence, created_at]
      properties:
        kind: { type: string, enum: [edge] }
        from_id: { type: string }
        to_id: { type: string }
        relation: { type: string }
        weight: { type: number }
        evidence: { type: string }
        created_at: { type: string }
        meta:
          type: object
          additionalProperties: true